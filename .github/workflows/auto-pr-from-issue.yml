name: Issue → MD Draft PR

on:
  issues:
    types: [labeled]

jobs:
  create-draft-pr:
    if: github.event.label.name == 'submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Create MD draft and PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const issueNumber = issue.number;

            let mdContent;

            // パターン1: ```yaml ... ``` ブロックがある場合（投稿フォーム経由）
            const yamlMatch = body.match(/```yaml\n([\s\S]*?)```/);
            if (yamlMatch) {
              mdContent = yamlMatch[1];
            } else {
              // パターン2: GitHubテンプレートのフォーム形式（**フィールド名**：値）
              function extractField(body, fieldName) {
                const regex = new RegExp(`\\*\\*${fieldName}\\*\\*[^：]*：(.*)`, '');
                const match = body.match(regex);
                return match ? match[1].trim() : '';
              }

              const title = extractField(body, '語録');
              const reading = extractField(body, '読み');
              const meaning = extractField(body, '意味');
              const tagsRaw = extractField(body, 'タグ');
              const rarityRaw = extractField(body, 'レア度');
              const firstAppearance = extractField(body, '初出');
              const youtubeUrl = extractField(body, 'YouTube URL');
              const contributorRaw = extractField(body, '投稿者ハンドルネーム');

              const explanationMatch = body.match(/## 解説\n([\s\S]*?)(?=\n##|$)/);
              const explanation = explanationMatch ? explanationMatch[1].trim() : '';

              if (!title || !meaning) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: '⚠️ 語録と意味は必須です。内容を確認してください。',
                });
                return;
              }

              const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
              const tagsYaml = tags.length > 0 ? `[${tags.join(', ')}]` : '[]';
              const rarity = parseInt(rarityRaw) || 3;
              const contributors = contributorRaw ? contributorRaw.split(',').map(c => c.trim()).filter(Boolean) : [];
              const today = new Date().toISOString().split('T')[0];

              mdContent = [
                `title: ${title}`,
                `reading: ${reading}`,
                `meaning: ${meaning}`,
                `tags: ${tagsYaml}`,
                `rarity: ${rarity}`,
                `updated_at: "${today}"`,
                `first_appearance: "${firstAppearance}"`,
                'image: ""',
                `contributor: [${contributors.map(c => `"${c}"`).join(', ')}]`,
                'usage: []',
                youtubeUrl ? `youtube_urls:\n  - label: ""\n    url: "${youtubeUrl}"` : 'youtube_urls: []',
                ...(explanation ? ['', '## 解説', explanation] : []),
              ].join('\n');

              mdContent = `---\n${mdContent}\n---\n`;
            }

            const branchName = `quote/issue-${issueNumber}`;
            const filePath = `src/content/quotes/quote-issue-${issueNumber}.md`;

            // mainブランチの最新SHAを取得
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/main',
            });

            // ブランチを作成（既存の場合はスキップ）
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: ref.object.sha,
              });
            } catch (e) {
              if (!e.message.includes('Reference already exists')) throw e;
            }

            // 既存ファイルのSHAを取得（再実行時の上書きに必要）
            let fileSha;
            try {
              const { data: existingFile } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: filePath,
                ref: branchName,
              });
              fileSha = existingFile.sha;
            } catch (e) {
              // ファイルが存在しない場合は無視
            }

            // MDファイルを作成または更新
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: filePath,
              message: `draft: Issue #${issueNumber} から語録ドラフトを自動生成`,
              content: Buffer.from(mdContent).toString('base64'),
              branch: branchName,
              ...(fileSha ? { sha: fileSha } : {}),
            });

            // 既存PRを確認（再実行時の重複作成を防止）
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branchName}`,
              state: 'open',
            });

            let prUrl;
            if (existingPRs.length > 0) {
              prUrl = existingPRs[0].html_url;
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[語録ドラフト] ${issue.title.replace('[語録投稿] ', '').replace('[語録提案] ', '')}`,
                body: [
                  '## 概要',
                  '',
                  `Issue #${issueNumber} から自動生成されたMDドラフトです。`,
                  '',
                  '**モデレーターへ：**',
                  `- [ ] ファイル名をローマ字表記に変更（現在: \`${filePath}\`）`,
                  '- [ ] 内容を確認・修正（rarity・reading の設定など）',
                  '- [ ] 必要に応じて画像を追加（`public/images/quotes/`）',
                  '- [ ] 問題なければドラフト解除してマージ',
                  '',
                  `Closes #${issueNumber}`,
                ].join('\n'),
                head: branchName,
                base: 'main',
                draft: true,
              });
              prUrl = pr.html_url;
            }

            // Issueにコメント
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `📝 MDドラフトPRを自動生成しました：${prUrl}\n\nモデレーターがPRを確認・修正してマージすると語録が公開されます。`,
            });
